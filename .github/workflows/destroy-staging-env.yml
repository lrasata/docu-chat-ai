name: Destroy Staging Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to destroy?"
        required: true
        type: choice
        options:
          - staging

jobs:
  destroy:
    name: Destroy Staging Terraform Layers
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read

    env:
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_app_id: docu-chat-ai
      TF_VAR_callback_urls: '["https://${{ github.event.inputs.environment }}.epic-trip-planner.com"]'
      TF_VAR_logout_urls: '["https://${{ github.event.inputs.environment }}.epic-trip-planner.com"]'
      TF_VAR_cloudfront_domain_name: ${{ github.event.inputs.environment }}.epic-trip-planner.com
      TF_VAR_api_backend_custom_domain_name: ${{ github.event.inputs.environment }}-backend-api.epic-trip-planner.com
      TF_VAR_api_file_upload_domain_name: ${{ github.event.inputs.environment }}-file-upload-api.epic-trip-planner.com
      TF_VAR_backend_certificate_arn: ${{secrets.BACKEND_CERTIFICATE_ARN}}
      TF_VAR_use_bucketav: false
      TF_VAR_bucket_av_sns_findings_topic_name: ""
      TF_VAR_uploads_bucket_name: file-uploads
      TF_VAR_enable_transfer_acceleration: true
      TF_VAR_secret_store_name: ${{secrets.SECRET_STORE_NAME}}
      TF_VAR_notification_email: ${{secrets.ALERT_EMAIL}}
      TF_VAR_route53_zone_name: epic-trip-planner.com
      TF_VAR_api_gateway_route53_zone_id: Z1U9ULNL0V5AJ3
      TF_VAR_cloudfront_certificate_arn: ${{secrets.FRONTEND_CERTIFICATE_ARN}}
      TF_VAR_s3_ingestion_lambda_code_bucket: docu-chat-ai-lambda-s3-ingestion
      TF_VAR_s3_ingestion_lambda_code_key: "${{ github.event.inputs.environment }}/s3-ingestion.zip"
      TF_VAR_s3_query_document_lambda_code_bucket: docu-chat-ai-lambda-s3-query-document
      TF_VAR_s3_query_document_lambda_code_key: "${{ github.event.inputs.environment }}/s3-query-document.zip"
      TF_VAR_bedrock_model_inference_profile_arn: ${{secrets.BEDROCK_MODEL_INFERENCE_PROFILE_ARN}}
      TF_VAR_max_search_results: 5
      TF_VAR_availability_zones: '["eu-central-1a","eu-central-1b"]'
      TF_VAR_db_instance_class: db.t4g.micro
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Destroy Frontend Layer
        working-directory: terraform/layers/frontend
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=frontend/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve

      - name: Clean up VPC ENIs (unblock subnet/SG deletion)
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${{ github.event.inputs.environment }}-docu-chat-ai-vpc" \
            --query "Vpcs[0].VpcId" --output text)
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=status,Values=available" \
              --query "NetworkInterfaces[*].NetworkInterfaceId" --output text)
            for ENI_ID in $ENI_IDS; do
              echo "Deleting ENI $ENI_ID"
              aws ec2 delete-network-interface --network-interface-id "$ENI_ID"
            done
          fi

      - name: Destroy Backend Layer
        working-directory: terraform/layers/backend
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=backend/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve || true

      - name: Clean up remaining VPC ENIs and retry destroy
        working-directory: terraform/layers/backend
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${{ github.event.inputs.environment }}-docu-chat-ai-vpc" \
            --query "Vpcs[0].VpcId" --output text)
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "Cleaning up ENIs in VPC $VPC_ID..."
            for i in 1 2 3; do
              ENI_IDS=$(aws ec2 describe-network-interfaces \
                --filters "Name=vpc-id,Values=$VPC_ID" "Name=status,Values=available" \
                --query "NetworkInterfaces[*].NetworkInterfaceId" --output text)
              if [ -z "$ENI_IDS" ] || [ "$ENI_IDS" = "None" ]; then
                echo "No available ENIs found"
                break
              fi
              for ENI_ID in $ENI_IDS; do
                echo "Deleting ENI $ENI_ID"
                aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
              done
              sleep 10
            done
          fi
          terraform destroy -auto-approve

      - name: Destroy Cognito Clients
        working-directory: terraform/layers/cognito
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=cognito/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve -target=module.cognito_clients

      - name: Destroy Cognito Base
        working-directory: terraform/layers/cognito
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=cognito/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve -target=module.cognito_base

      - name: Destroy Secrets Layer
        working-directory: terraform/layers/secrets
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=secrets/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"
          terraform destroy -auto-approve
