name: Apply Secrets/Cognito/Backend layers to Staging Env

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging

jobs:
  apply-secrets:
    name: Secrets - Apply to ${{ github.event.inputs.environment }} Env
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_app_id: docu-chat-ai
      TF_VAR_environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/layers/secrets
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=secrets/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: terraform/layers/secrets
        run: |
          terraform apply -auto-approve

  apply-cognito:
    needs: apply-secrets
    name: Cognito - Apply to ${{ github.event.inputs.environment }} Env
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_app_id: docu-chat-ai
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_callback_urls: '["https://${{ github.event.inputs.environment }}.epic-trip-planner.com"]'
      TF_VAR_logout_urls: '["https://${{ github.event.inputs.environment }}.epic-trip-planner.com"]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/layers/cognito
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=cognito/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform Apply - Cognito Base
        working-directory: terraform/layers/cognito
        run: |
          terraform apply -target="module.cognito_base" -auto-approve

      - name: Terraform Apply - Cognito Clients
        working-directory: terraform/layers/cognito
        run: |
          terraform apply -target="module.cognito_clients" -auto-approve

  apply-backend:
    name: Backend - Apply to ${{ github.event.inputs.environment }} Env
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: apply-cognito
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_environment: ${{ github.event.inputs.environment }}
      TF_VAR_app_id: docu-chat-ai
      TF_VAR_route53_zone_name: epic-trip-planner.com
      TF_VAR_api_gateway_route53_zone_id: Z1U9ULNL0V5AJ3
      TF_VAR_cloudfront_domain_name: ${{ github.event.inputs.environment }}.epic-trip-planner.com
      TF_VAR_api_backend_custom_domain_name: ${{ github.event.inputs.environment }}-backend-api.epic-trip-planner.com
      TF_VAR_api_file_upload_domain_name: ${{ github.event.inputs.environment }}-file-upload-api.epic-trip-planner.com
      TF_VAR_backend_certificate_arn: ${{secrets.BACKEND_CERTIFICATE_ARN}}
      TF_VAR_use_bucketav: false
      TF_VAR_bucket_av_sns_findings_topic_name: ""
      TF_VAR_uploads_bucket_name: file-uploads
      TF_VAR_enable_transfer_acceleration: true
      TF_VAR_secret_store_name: ${{secrets.SECRET_STORE_NAME}}
      TF_VAR_notification_email: ${{secrets.ALERT_EMAIL}}
      TF_VAR_s3_ingestion_lambda_code_bucket: docu-chat-ai-lambda-s3-ingestion
      TF_VAR_s3_ingestion_lambda_code_key: "${{ github.event.inputs.environment }}/s3-ingestion.zip"
      TF_VAR_s3_query_document_lambda_code_bucket: docu-chat-ai-lambda-s3-query-document
      TF_VAR_s3_query_document_lambda_code_key: "${{ github.event.inputs.environment }}/s3-query-document.zip"
      TF_VAR_bedrock_model_inference_profile_arn: ${{secrets.BEDROCK_MODEL_INFERENCE_PROFILE_ARN}}
      TF_VAR_max_search_results: 5
      TF_VAR_availability_zones: '["eu-central-1a","eu-central-1b"]'
      TF_VAR_db_instance_class: db.t4g.micro
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/layers/backend
        run: |
          terraform init \
            -input=false -upgrade \
            -backend-config="bucket=docu-chat-ai-app-states" \
            -backend-config="key=backend/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=eu-central-1" \
            -backend-config="dynamodb_table=${{ github.event.inputs.environment }}-docu-chat-ai-terraform-locks" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform/layers/backend
        run: |
          terraform validate

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Module File Uploader - Build Lambda packages (${{ github.event.inputs.environment }})
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential python3 libvips-dev
          cd terraform/layers/backend/.terraform/modules/file_uploader/terraform/modules/file_uploader/src/lambdas/upload_file
          npm ci --silent --no-audit
          npm run build
          cd ../process_uploaded_file
          npm ci --silent --no-audit
          npm run build
          cd ../get_files
          npm ci --silent --no-audit
          npm run build
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build S3 Ingestion Lambda dependencies (Amazon Linux)
        run: |
          cd terraform/layers/backend/src/lambda_functions/s3_ingestion
          rm -rf build
          mkdir build

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint "" \
            -v "$PWD:/var/task" \
            public.ecr.aws/sam/build-python3.11 \
            bash -c "pip install -r requirements.txt -t build/"

      - name: Build Query Document Lambda dependencies (Amazon Linux)
        run: |
          cd terraform/layers/backend/src/lambda_functions/query_document
          rm -rf build
          mkdir build

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --entrypoint "" \
            -v "$PWD:/var/task" \
            public.ecr.aws/sam/build-python3.11 \
            bash -c "pip install -r requirements.txt -t build/"

      - name: Package S3 Ingestion Lambda
        run: |
          cd terraform/layers/backend/src/lambda_functions/s3_ingestion
          cp s3_ingestion.py build/
          cd build
          zip -r ../lambda_s3_ingestion.zip .

      - name: Package Query Document Lambda
        run: |
          cd terraform/layers/backend/src/lambda_functions/query_document
          cp query_document.py build/
          cd build
          zip -r ../lambda_query_document.zip .

      - name: Upload S3 Ingestion Lambda to S3
        run: |
          aws s3 cp terraform/layers/backend/src/lambda_functions/s3_ingestion/lambda_s3_ingestion.zip \
                    s3://$TF_VAR_s3_ingestion_lambda_code_bucket/$TF_VAR_s3_ingestion_lambda_code_key

      - name: Upload Query Document Lambda to S3
        run: |
          aws s3 cp terraform/layers/backend/src/lambda_functions/query_document/lambda_query_document.zip \
                    s3://$TF_VAR_s3_query_document_lambda_code_bucket/$TF_VAR_s3_query_document_lambda_code_key

      - name: Terraform Apply
        working-directory: terraform/layers/backend
        env:
          TF_LOG: ERROR
          TF_LOG_PATH: /tmp/tf-backend-apply.log
        run: terraform apply -input=false -auto-approve 2>&1

      - name: Upload Terraform log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-log
          path: /tmp/tf-backend-apply.log

      - name: Force Lambda code update
        run: |
          aws lambda update-function-code \
            --function-name $(aws lambda list-functions --query 'Functions[?contains(FunctionName, `s3-ingestion`) && contains(FunctionName, `${{ github.event.inputs.environment }}`)].FunctionName' --output text) \
            --s3-bucket $TF_VAR_s3_ingestion_lambda_code_bucket \
            --s3-key $TF_VAR_s3_ingestion_lambda_code_key
          
          aws lambda update-function-code \
            --function-name $(aws lambda list-functions --query 'Functions[?contains(FunctionName, `query-document`) && contains(FunctionName, `${{ github.event.inputs.environment }}`)].FunctionName' --output text) \
            --s3-bucket $TF_VAR_s3_query_document_lambda_code_bucket \
            --s3-key $TF_VAR_s3_query_document_lambda_code_key